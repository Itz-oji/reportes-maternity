<section class="page turno">
  <h2>🕒 Datos del turno</h2>
  <hr/>

  <!-- Fecha del turno -->
  <div class="field">
    <label for="fechaTurno">Fecha del turno <span class="req">*</span></label>
    <small>Del día en que empezó el turno</small>
    <input id="fechaTurno" class="fechaTurno input" type="text" placeholder="Selecciona una fecha" readonly/>
  </div>

  <!-- Hora de inicio y término -->
  <div class="field-group">
    <div class="col">
      <label for="horaInicio">Hora inicio <span class="req">*</span></label>
      <input id="horaInicio" class="input js-inicio" type="time" />
    </div>

    <div class="col">
      <label for="horaTermino">Hora término <span class="req">*</span></label>
      <input id="horaTermino" class="input js-termino" type="time" />
    </div>
  </div>

  <!-- Beneficiario -->
  <div class="field">
    <label for="beneficiario">
      Nombre del beneficiario <span class="req">*</span>
    </label>
    <input
      id="beneficiario"
      class="input"
      type="text"
      placeholder="Ingresa el nombre del beneficiario"
      autocomplete="name"
    />
  </div>

  <!-- Profesional -->
  <div class="field">
    <label for="profesional">
      Profesional <span class="req">*</span>
    </label>
    <select id="profesional" class="input">
      <option value="">Selecciona un profesional</option>
    </select>
  </div>

</section>
